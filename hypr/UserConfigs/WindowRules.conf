# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */
# Window and Layer Rules — Using only class/title (no tags in behavior rules)
# See https://wiki.hyprland.org/Configuring/Window-Rules/

# === BEHAVIOR RULES (BY CLASS/TITLE ONLY) ===

# Special overrides for video players
windowrule = no_blur on, match:class ^(mpv|vlc)$
windowrule = opacity 1.0 override, match:class ^(mpv|vlc)$

# Centering
windowrule = center on, match:title "^(KooL Quick Cheat Sheet)$"
windowrule = center on, match:class Thunar, match:title "negative:(.*Thunar.*)"
windowrule = center on, match:title "^(ROG Control)$"
windowrule = center on, match:class ^(nwg-displays|nwg-look)$
windowrule = center on, match:title "^(Keybindings)$"
windowrule = center on, match:class ^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$
windowrule = center on, match:class ^(Whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap)$
windowrule = center on, match:class ^(Ferdium)$
windowrule = move (monitor_w*0.72) (monitor_h*0.07), match:title "^(Picture-in-Picture)$"

# Idle inhibit for fullscreen
windowrule = idle_inhibit fullscreen, match:fullscreen on

# Floating — based on class/title
windowrule = float on, match:title "^(KooL Quick Cheat Sheet)$"
windowrule = float on, match:class ^(Waytrogen)$  # wallpaper
windowrule = float on, match:title "^(ROG Control)$"
windowrule = float on, match:class ^(nwg-displays|nwg-look)$
windowrule = float on, match:class ^(gnome-system-monitor|org\.gnome\.SystemMonitor|io\.missioncenter\.MissionCenter|evince|eog|org\.gnome\.Loupe)$  # viewer
windowrule = float on, match:class ^(Zoom|onedriver|onedriver-launcher)$
windowrule = float on, match:class ^(org\.gnome\.Calculator)$, match:title "^(Calculator)$"
windowrule = float on, match:class ^(mpv|com\.github\.rafostar\.Clapper)$
windowrule = float on, match:class ^(Qalculate-gtk)$
windowrule = float on, match:class ^(Ferdium)$
windowrule = float on, match:title "^(Picture-in-Picture)$"

# Popups & dialogs
windowrule = float on, match:title "^(Authentication Required)$"
windowrule = center on, match:title "^(Authentication Required)$"

# Floating for non-main windows (popups) of apps
windowrule = float on, match:class ^(codium|codium-url-handler|VSCodium)$, match:title "negative:(.*codium.*|.*VSCodium.*)"
windowrule = float on, match:class ^(com\.heroicgameslauncher\.hgl)$, match:title "negative:^(Heroic Games Launcher)$"
windowrule = float on, match:class ^(Steam)$, match:title "negative:^(Steam)$"
windowrule = float on, match:class ^(Thunar)$, match:title "negative:(.*Thunar.*)"

# File/save dialogs
windowrule = float on, match:title "^(Add Folder to Workspace)$"
windowrule = size (monitor_w*0.7) (monitor_h*0.6), match:title "^(Add Folder to Workspace)$"
windowrule = center on, match:title "^(Add Folder to Workspace)$"

windowrule = float on, match:title "^(Save As)$"
windowrule = size (monitor_w*0.7) (monitor_h*0.6), match:title "^(Save As)$"
windowrule = center on, match:title "^(Save As)$"

windowrule = float on, match:initial_title "^(Open Files)$"
windowrule = size (monitor_w*0.7) (monitor_h*0.6), match:initial_title "^(Open Files)$"

windowrule = float on, match:title "^(SDDM Background)$"
windowrule = center on, match:title "^(SDDM Background)$"
windowrule = size (monitor_w*0.16) (monitor_h*0.12), match:title "^(SDDM Background)$"

# Opacity
# IM apps
windowrule = opacity 0.94 0.86, match:class ^(Discord|WebCord|Desktop|Ferdium|Whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap|org\.telegram\.desktop|io\.github\.tdesktop_x64\.TDesktop|teams-for-linux|im\.riot\.Riot|Element)$

# Multimedia (non-video)
windowrule = opacity 0.94 0.86, match:class ^(Audacious)$

# File managers
windowrule = opacity 0.9 0.8, match:class ^(Thunar|org\.gnome\.Nautilus|Pcmanfm-qt|app\.drey\.Warp)$

# Terminals
windowrule = opacity 0.7 0.7, match:class ^(kitty|Kitty|kitty-dropterm|Alacritty)$

# Settings/utilities
windowrule = opacity 0.8 0.7, match:class ^(wihotspot(-gui)?|Baobab|org\.gnome\.Baobab|gnome-disks|file-roller|org\.gnome\.FileRoller|nm-applet|nm-connection-editor|blueman-manager|pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol|qt5ct|qt6ct|Yad|xdg-desktop-portal-gtk|org\.kde\.polkit-kde-authentication-agent-1|Rofi)$

# Viewers
windowrule = opacity 0.82 0.75, match:class ^(gnome-system-monitor|org\.gnome\.SystemMonitor|io\.missioncenter\.MissionCenter|evince|eog|org\.gnome\.Loupe)$

# Wallpapers
windowrule = opacity 0.9 0.7, match:class ^(Waytrogen)$

# Editors
windowrule = opacity 0.8 0.7, match:class ^(gedit|org\.gnome\.TextEditor|mousepad)$

# Others
windowrule = opacity 0.9 0.8, match:class ^(deluge|seahorse)$
windowrule = opacity 0.95 0.75, match:title "^(Picture-in-Picture)$"
windowrule = opacity 0.9 override, match:class ^(code)$

# Size rules
windowrule = size (monitor_w*0.65) (monitor_h*0.9), match:title "^(KooL Quick Cheat Sheet)$"
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(Waytrogen)$  # wallpaper
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(wihotspot(-gui)?|Baobab|org\.gnome\.Baobab|gnome-disks|file-roller|org\.gnome\.FileRoller|nm-applet|nm-connection-editor|blueman-manager|pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol|qt5ct|qt6ct|Yad|xdg-desktop-portal-gtk|org\.kde\.polkit-kde-authentication-agent-1|Rofi|nwg-displays|nwg-look)$  # settings
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:class ^(Whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap|Ferdium)$

# Pinning
windowrule = pin on, match:title "^(Picture-in-Picture)$"

# Keep aspect ratio
windowrule = keep_aspect_ratio on, match:title "^(Picture-in-Picture)$"

# Games
windowrule = no_blur on, match:class ^(gamescope|steam_app_\d+)$
windowrule = fullscreen on, match:class ^(gamescope|steam_app_\d+)$

# Focus rules
windowrule = no_initial_focus on, match:class ^(jetbrains-.+)$
windowrule = no_initial_focus on, match:title "^(wind.*)$"


# === LAYER RULES (unchanged) ===
layerrule = blur on, match:namespace "^(rofi|notifications|quickshell:overview)$"
layerrule = ignore_alpha 0.5, match:namespace "^(quickshell:overview)$"
